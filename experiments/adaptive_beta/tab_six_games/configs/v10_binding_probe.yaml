# total_runs: 18 (6 cells × 1 method × 3 seeds; 100 ep)
#
# Quick sanity probe: do the 6 v10-new (game, subcase) bindings run cleanly?
# Bindings exercised here that pre-v10 main pass did NOT cover:
#   - AC-Inertia
#   - MP-RegretMatching, MP-HypothesisTesting
#   - RR-ConventionSwitch
#   - SO-ZeroSum, SO-BiasedPreference
#   - PG-Congestion, PG-BetterReplyInertia
#   (RR-Sparse + SH-SmoothedFP + SH-HypothesisTesting cells already validated)

stage: v10_binding_probe
phase: VIII

episodes: 100
seeds: [0, 1, 2]
methods:
  - vanilla

gamma: 0.95
learning_rate: 0.1
q_init: 0.0

epsilon:
  start: 1.0
  end: 0.05
  decay_episodes: 50

subcases:
  - id: AC-Inertia
    game: asymmetric_coordination
    game_kwargs:
      horizon: 20
    adversary: inertia
    adversary_kwargs:
      inertia_lambda: 0.9
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  - id: MP-RegretMatching
    game: matching_pennies
    game_kwargs:
      horizon: 20
    adversary: finite_memory_regret_matching
    adversary_kwargs:
      memory_m: 20
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  - id: RR-ConventionSwitch
    game: rules_of_road
    game_kwargs:
      horizon: 20
    adversary: convention_switching
    adversary_kwargs: {}
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  - id: SO-ZeroSum
    game: soda_uncertain
    game_kwargs:
      subcase: SO-ZeroSum
      horizon: 20
      m: 3
    adversary: stationary_mixed
    adversary_kwargs:
      probs: [0.3333333333333333, 0.3333333333333333, 0.3333333333333334]
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  - id: PG-Congestion
    game: potential
    game_kwargs:
      subcase: PG-Congestion
      horizon: 20
      m: 3
    adversary: stationary_mixed
    adversary_kwargs:
      probs: [0.3333333333333333, 0.3333333333333333, 0.3333333333333334]
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  - id: PG-BetterReplyInertia
    game: potential
    game_kwargs:
      subcase: PG-BetterReplyInertia
      horizon: 20
      m: 3
    adversary: inertia
    adversary_kwargs:
      inertia_lambda: 0.9
      n_actions: 3   # required: parametric game has no module-level payoff_opponent
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
