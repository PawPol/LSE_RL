# total_runs: 40  (2 cells × 4 β × 5 seeds)
#
# Phase VIII M6 wave 5 — figures-only β-grid sub-pass (spec §10.2 patch §4).
#
# Scope: supplementary β grid {-0.25, -0.1, +0.1, +0.25} for the
# headline operator-diagnostic figures only. NOT included in main
# statistical comparisons; aggregator tags these with
# `figure_only_beta = true` so they are excluded from main tables.
#
# Cell selection (per spec §10.2 wave 5 contract):
#   * G_+ slot: AC-FictitiousPlay (fallback per spec; Stage A Wave 2
#       did NOT confirm RR-StationaryConvention as G_+ — vanilla
#       outperformed +β in 17/18 cells per v7 finding extension).
#       AC-FictitiousPlay shows the cleanest visual destabilization
#       signature for figures (-42159 at +1 vs ~52000 elsewhere).
#   * G_- slot: SH-FiniteMemoryRegret per Phase VII Stage B2 precedent.
#
# Episodes: 10,000 (same as main pass for shape comparability).
# Seeds: 5 (lighter than main pass).

stage: figures_only_beta_grid
phase: VIII

episodes: 10000
seeds: [0, 1, 2, 3, 4]

methods:
  - fixed_beta_-0.25
  - fixed_beta_-0.1
  - fixed_beta_+0.1
  - fixed_beta_+0.25

gamma: 0.95
learning_rate: 0.1
q_init: 0.0

epsilon:
  start: 1.0
  end: 0.05
  decay_episodes: 5000

subcases:
  - id: AC-FictitiousPlay
    game: asymmetric_coordination
    game_kwargs:
      horizon: 20
    adversary: finite_memory_fictitious_play
    adversary_kwargs:
      memory_m: 20
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
    figure_only: true
  - id: SH-FiniteMemoryRegret
    game: shapley
    game_kwargs:
      horizon: 20
    adversary: finite_memory_regret_matching
    adversary_kwargs:
      memory_m: 20
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
    figure_only: true
