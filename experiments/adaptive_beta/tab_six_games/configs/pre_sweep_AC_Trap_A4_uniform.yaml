# total_runs: 9  (1 cell × 3 methods × 3 seeds)
#
# AC-Trap ablation A4 — uniform random opponent test (HALT 6 step A.1).
# stationary_mixed [0.5, 0.5] removes opponent-learning dynamics
# entirely. Tests whether agent-side dynamics alone produce the
# +β destabilization.

stage: pre_sweep_AC_Trap_A4_uniform
phase: VIII

episodes: 200
seeds: [0, 1, 2]

methods:
  - vanilla
  - fixed_beta_-1
  - fixed_beta_+1

gamma: 0.95
learning_rate: 0.1
q_init: 0.0

epsilon:
  start: 1.0
  end: 0.05
  decay_episodes: 100

subcases:
  - id: AC-Trap
    game: asymmetric_coordination
    game_kwargs:
      horizon: 20
    adversary: stationary_mixed
    adversary_kwargs:
      probs: [0.5, 0.5]
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
