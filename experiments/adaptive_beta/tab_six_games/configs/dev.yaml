# total_runs: 378  (18 cells × 7 methods × 3 seeds)
#
# Phase VIII Stage A — dev pass (spec §10.1).
#
# Scope
# -----
# 1000 episodes; seeds [0, 1, 2]; 7-arm β grid (vanilla + fixed_beta_±0.5,
# ±1, ±2); 7 games (matching_pennies, shapley, rules_of_road,
# asymmetric_coordination, soda_uncertain, potential, delayed_chain);
# subcases = canonical + ≥1 nonstationary subcase per game (per spec
# §10.1).
#
# Cell breakdown (18 = 3 × 6 + 0):
#   * matching_pennies:        2 subcases
#   * shapley:                 2 subcases
#   * rules_of_road:           2 subcases  (canonical convention + tremble)
#   * asymmetric_coordination: 3 subcases  (canonical + AC-Trap +
#                                          smoothed-FP nonstationary)
#   * soda_uncertain:          3 subcases  (coordination, anti-coord,
#                                          type-switch nonstationary)
#   * potential:               2 subcases  (coordination potential +
#                                          switching nonstationary)
#   * delayed_chain:           4 subcases  (DC-Short10 / Medium20 /
#                                          Long50 / Branching20)
#   total: 18 subcases
#
# Headline-metric routing (M2 reopen v5b):
#   * delayed_chain advance-only (DC-Short10/Medium20/Long50)
#       → headline_metric: bellman_residual_beta_auc
#       → t11_guard:       gap_based   (deterministic testbed)
#   * delayed_chain DC-Branching20
#       → headline_metric: cumulative_return_auc
#       → t11_guard:       cohens_d    (stochastic; Discrete(2))
#   * all matrix games (MP / SH / RR / AC / SO / PG)
#       → headline_metric: cumulative_return_auc
#       → t11_guard:       cohens_d    (ε > 0 + multi-action explore)
#
# Adversary parameter notes
# -------------------------
# Matrix-game adversaries follow the Phase VII-B Stage B2-Dev defaults
# (see strategic_games/configs/stage_B2_dev.yaml); nonstationary
# variants reuse the registered nonstationary opponent classes.

stage: stage1_beta_sweep
phase: VIII

episodes: 1000
seeds: [0, 1, 2]

methods:
  - vanilla
  - fixed_beta_-2
  - fixed_beta_-1
  - fixed_beta_-0.5
  - fixed_beta_+0.5
  - fixed_beta_+1
  - fixed_beta_+2

gamma: 0.95
learning_rate: 0.1
q_init: 0.0

epsilon:
  start: 1.0
  end: 0.05
  decay_episodes: 500

subcases:
  # ---------------- matching_pennies ----------------
  - id: MP-Stationary
    game: matching_pennies
    game_kwargs:
      horizon: 20
    adversary: stationary_mixed
    adversary_kwargs:
      probs: [0.5, 0.5]
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  - id: MP-FiniteMemoryBR
    game: matching_pennies
    game_kwargs:
      horizon: 20
    adversary: finite_memory_best_response
    adversary_kwargs:
      memory_m: 20
      inertia_lambda: 0.5
      temperature: 0.2
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d

  # ---------------- shapley ----------------
  - id: SH-FictitiousPlay
    game: shapley
    game_kwargs:
      horizon: 20
    adversary: finite_memory_fictitious_play
    adversary_kwargs:
      memory_m: 20
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  - id: SH-FiniteMemoryRegret
    game: shapley
    game_kwargs:
      horizon: 20
    adversary: finite_memory_regret_matching
    adversary_kwargs:
      memory_m: 20
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d

  # ---------------- rules_of_road ----------------
  - id: RR-StationaryConvention
    game: rules_of_road
    game_kwargs:
      horizon: 20
    adversary: stationary
    adversary_kwargs:
      probs: [0.7, 0.3]   # right-biased convention
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  - id: RR-Tremble
    game: rules_of_road
    game_kwargs:
      horizon: 20
      tremble_prob: 0.05
    adversary: stationary
    adversary_kwargs:
      probs: [0.7, 0.3]
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d

  # ---------------- asymmetric_coordination ----------------
  - id: AC-FictitiousPlay
    game: asymmetric_coordination
    game_kwargs:
      horizon: 20
    adversary: finite_memory_fictitious_play
    adversary_kwargs:
      memory_m: 20
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  # AC-Trap (M6 wave 1.5 pre-sweep + main): regret matching opponent
  # tests payoff-dominance claim directly via counterfactual regret
  # over (Stag, Hare) payoff structure. Single-param opponent
  # (memory_m=20) avoids hyperparameter pilot. Per HALT 5 resolution
  # OQ3 (2026-05-01).
  - id: AC-Trap
    game: asymmetric_coordination
    game_kwargs:
      horizon: 20
    adversary: finite_memory_regret_matching
    adversary_kwargs:
      memory_m: 20
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  - id: AC-SmoothedBR
    game: asymmetric_coordination
    game_kwargs:
      horizon: 20
    adversary: smoothed_fictitious_play
    adversary_kwargs:
      memory_m: 20
      temperature: 0.5
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d

  # ---------------- soda_uncertain ----------------
  - id: SO-Coordination
    game: soda_uncertain
    game_kwargs:
      subcase: SO-Coordination
      horizon: 20
      m: 3
    adversary: stationary
    adversary_kwargs:
      probs: [0.3333333333333333, 0.3333333333333333, 0.3333333333333334]
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  - id: SO-AntiCoordination
    game: soda_uncertain
    game_kwargs:
      subcase: SO-AntiCoordination
      horizon: 20
      m: 3
    adversary: stationary
    adversary_kwargs:
      probs: [0.3333333333333333, 0.3333333333333333, 0.3333333333333334]
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  - id: SO-TypeSwitch
    game: soda_uncertain
    game_kwargs:
      subcase: SO-TypeSwitch
      horizon: 20
      m: 3
    adversary: stationary
    adversary_kwargs:
      probs: [0.3333333333333333, 0.3333333333333333, 0.3333333333333334]
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d

  # ---------------- potential ----------------
  - id: PG-CoordinationPotential
    game: potential
    game_kwargs:
      subcase: PG-CoordinationPotential
      horizon: 20
      m: 3
    adversary: stationary
    adversary_kwargs:
      probs: [0.3333333333333333, 0.3333333333333333, 0.3333333333333334]
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
  - id: PG-SwitchingPayoff
    game: potential
    game_kwargs:
      subcase: PG-SwitchingPayoff
      horizon: 20
      m: 3
    adversary: stationary
    adversary_kwargs:
      probs: [0.3333333333333333, 0.3333333333333333, 0.3333333333333334]
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d

  # ---------------- delayed_chain ----------------
  - id: DC-Short10
    game: delayed_chain
    game_kwargs:
      subcase: DC-Short10
    adversary: passive
    adversary_kwargs: {}
    headline_metric: bellman_residual_beta_auc
    t11_guard: gap_based
  - id: DC-Medium20
    game: delayed_chain
    game_kwargs:
      subcase: DC-Medium20
    adversary: passive
    adversary_kwargs: {}
    headline_metric: bellman_residual_beta_auc
    t11_guard: gap_based
  - id: DC-Long50
    game: delayed_chain
    game_kwargs:
      subcase: DC-Long50
    adversary: passive
    adversary_kwargs: {}
    headline_metric: bellman_residual_beta_auc
    t11_guard: gap_based
  - id: DC-Branching20
    game: delayed_chain
    game_kwargs:
      subcase: DC-Branching20
    adversary: passive
    adversary_kwargs: {}
    headline_metric: cumulative_return_auc
    t11_guard: cohens_d
