# Phase VII Stage B — main pass.
#
# 10 seeds x 10k episodes; runs only on the 1-2 environments promoted from
# Stage A (named explicitly here by the orchestrator after Stage A sign-off).
#
# Spec: docs/specs/phase_VII_adaptive_beta.md §8.2.

stage: main
n_episodes: 10000
gamma: 0.95
learning_rate: 0.1
stratify_every: 10   # Stage B keeps every 10th transition + all shifts/catastrophes.

epsilon:
  start: 1.0
  end: 0.05
  decay_episodes: 5000

schedule:
  beta_max: 2.0
  beta_cap: 2.0
  k: 5.0
  initial_beta: 0.0
  beta_tol: 1.0e-8
  lambda_smooth: 1.0
  beta0: 1.0

methods:
  - vanilla
  - fixed_positive
  - fixed_negative
  - wrong_sign
  - adaptive_beta
  - adaptive_beta_no_clip
  - adaptive_sign_only
  - adaptive_magnitude_only

envs:
  # Placeholder: the orchestrator overwrites this list after Stage A.
  - name: hazard_gridworld
    kwargs:
      grid_size: 7
      horizon: 50
      num_hazards: 5
      goal_reward: 10.0
      hazard_reward: -10.0
      step_reward: -0.01
      hazard_switch_period_episodes: 250
  - name: delayed_chain
    kwargs:
      chain_length: 20
      horizon: 25
      terminal_reward: 50.0
      step_reward: 0.0
