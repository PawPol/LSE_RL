# Phase VII Stage C — headline pass.
#
# 20 seeds x 10k episodes on a single headline environment promoted from
# Stage B with paired-CI evidence. Skipped if Stage B effect is small,
# marginal, or unstable (spec §8.3).
#
# Spec: docs/specs/phase_VII_adaptive_beta.md §8.3.

stage: headline
n_episodes: 10000
gamma: 0.95
learning_rate: 0.1
stratify_every: 10

epsilon:
  start: 1.0
  end: 0.05
  decay_episodes: 5000

schedule:
  beta_max: 2.0
  beta_cap: 2.0
  k: 5.0
  initial_beta: 0.0
  beta_tol: 1.0e-8
  lambda_smooth: 1.0
  beta0: 1.0

methods:
  - vanilla
  - fixed_positive
  - fixed_negative
  - adaptive_beta
  - adaptive_beta_no_clip

envs:
  # Placeholder: the orchestrator pins exactly one env here after Stage B.
  - name: hazard_gridworld
    kwargs:
      grid_size: 7
      horizon: 50
      num_hazards: 5
      goal_reward: 10.0
      hazard_reward: -10.0
      step_reward: -0.01
      hazard_switch_period_episodes: 250
