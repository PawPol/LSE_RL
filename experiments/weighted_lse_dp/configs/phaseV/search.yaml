# Phase V WP1c search driver default config.
#
# Spec reference: docs/specs/phase_V_mechanism_experiments.md sections 4, 5,
# 7 (WP1c), 8, 13.
#
# This config is resolved in-runner by run_phase_V_search.py. Every
# parameter is consumed at grid-enumeration or promotion-gate time; none of
# the thresholds below may be relaxed to "get a shortlist" -- per spec
# section 4 the response to an empty shortlist is family refinement, not
# threshold drift.

families: ["A", "B", "C"]

family_params:
  A:
    # L, R pairs drive horizon and jackpot magnitude; gamma is fixed.
    L_range: [4, 8, 12]
    R_range: [1.0, 2.0, 5.0]
    gamma: 0.95
    # Shape basis for the c_k = c_tie + h_k perturbation. "flat" recovers
    # the constant-c baseline; the other three are the first-tier shape
    # basis (spec section 5 Family A "shape-preserving perturbation basis").
    shapes: ["flat", "one_bump", "ramp"]
    # Near-indifference epsilon band around lam_tie(psi).
    eps_band_pts: 7
    eps_band_frac: 0.2
  B:
    L_range: [4, 8]
    p_range: [0.05, 0.10, 0.20]
    C_range: [2.0, 5.0]
    # b (impulse) fixed; the tie parameter is b_safe = b - p gamma^{L-1} C.
    b: 1.0
    variants: ["single_event", "warning_state", "multi_event"]
    gamma: 0.95
    eps_band_pts: 7
    eps_band_frac: 0.2
  C:
    # Family C has no classical-tie sweep (see family_c_raw_stress.py
    # metadata.classical_tie_sweep_supported = False); we sweep only psi.
    L_tail_range: [4, 6, 8]
    R_penalty_range: [1.0, 2.0]
    beta_raw_multiplier_range: [1.5, 2.5, 4.0]
    gamma: 0.95

# Hard cap on admitted candidates per search invocation (spec section 13.3).
max_candidates: 5000
# Per-family soft-cap warning threshold (60% of max_candidates per spec).
per_family_warn_frac: 0.60

# Cheap contest_gap_norm prefilter bands (spec section 3).
prefilter_soft_band: 0.02   # exploratory only (spec section 13.1)
strict_band: 0.01            # promotion-grade (spec section 4)

# Promotion gate thresholds (spec section 4). HARD-CODED -- do not change
# without an orchestrator decision.
promotion:
  policy_disagreement_min: 0.05
  mass_delta_d_min: 0.10
  value_gap_norm_min: 0.005
  clip_fraction_min: 0.05
  clip_fraction_max: 0.80
  cert_tolerance: 1.0e-6

# Family C stress-family criterion (spec section 5 Family C).
family_c_stress:
  raw_deriv_p90_over_kappa: true
  clip_fraction_min: 0.05

# Empty-shortlist gate (spec section 13.2 -- conjunctive stopping rule).
empty_shortlist_gate:
  min_positive_families: 2
  min_safety_families: 1

# Pilot settings for schedule calibration (spec WP1a brief G1).
# A single seeded classical-optimal rollout per candidate -- Family A/B MDPs
# are small and mostly deterministic, so 30 episodes is more than enough to
# populate per-stage quantiles.
pilot:
  n_episodes: 30
  eps_greedy: 0.1

# Reproducibility contract: seed controls only psi-grid stochastic bits and
# pilot-rollout RNG. Tie solver and DP are deterministic functions of
# (lam, psi).
seed: 42
